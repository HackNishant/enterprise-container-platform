apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/description: >-
      Using the 'latest' tag for container images can lead to unpredictable builds 
      and makes auditing difficult. This policy ensures all images define a specific tag.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: validate-image-tag
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Using the 'latest' tag or omitting a tag is forbidden. Use a specific version tag."
      pattern:
        spec:
          containers:
          - image: "!*latest"