name: Container DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Build and Scan Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Local Docker Image
        run: |
          docker build -t secure-app:${{ github.sha }} ./app
      - name: Run Trivy Vulnerability Scanner
        # Using the official, post-remediation signed release tag
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'secure-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'library'
          severity: 'CRITICAL,HIGH'